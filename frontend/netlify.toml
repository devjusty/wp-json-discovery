[build]
  command = "pnpm --filter frontend run build"
  publish = "frontend/dist"

[build.environment]
  PNPM_VERSION = "10.33.0"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
